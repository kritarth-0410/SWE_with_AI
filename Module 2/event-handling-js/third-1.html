<!DOCTYPE html>
<html lang = "en">
  <head>
    <meta charset = "UTF - 8" />
    <meta http-equiv = "X - UA - Compatible" content = "IE = edge" />
    <meta name = "viewport" content = "width = device - width, initial-scale = 1.0" />
    <title>Document</title>
  </head>
  <body>
    <button id = "removeAll">Remove All</button>
    <ul>
      <li>
        <p>Task - 1</p>
        <button class="delete_button">delete</button>
      </li>
      <li>
        <p>Task - 2</p>
        <button class="delete_button">delete</button>
      </li>
      <li>
        <p>Task - 3</p>
        <button class="delete_button">delete</button>
      </li>
      <li>
        <p>Task - 4</p>
        <button class="delete_button">delete</button>
      </li>
    </ul>

    <script>
        // Task - Make all the buttons work
        // Delete All button should remove all the tasks.
        // Delete button should remove that particular task

        const allDeleteBtns = document.querySelectorAll(".delete_button")

        for(let i = 0; i < allDeleteBtns.length; i++) {
            allDeleteBtns[i].addEventListener('click', function(e) {
                e.target.parentElement.remove()
            })
        }

        //removeAll button
        const removeAllBtn = document.querySelector("#removeAll")

        removeAllBtn.addEventListener('click', function() {
            const ul = document.querySelector("ul")
            ul.remove()
        })
    </script>


    </body>
</html>
