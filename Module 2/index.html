<!-- HTML - Structure of the Website.
CSS - Decoration of the Website.
JavaScript - Interactivity or moving parts to the Website. -->

<!-- Type of CSS - 
1. External CSS
2. Internal CSS
3. Inline CSS  -->

<!-- Priority : Inline CSS > Interal CSS > External CSS -->

<!-- CSS Selectors - Element Selector, Class Selector, ID Selector -->

<!-- CSS Box Model -->
<!-- 
Content — the actual text or image inside
Padding — space between content and the border
Border — the edge around the padding
Margin — space outside the border, separating boxes -->

<!-- Positioning
Static — default, elements flow normally
Relative — positioned relative to its normal position
Absolute — positioned relative to the nearest positioned ancestor
Fixed — positioned relative to the viewport, doesn't scroll
Sticky — toggles between relative and fixed based on scroll position -->

<!-- CSS Grid - Two-Dimensional layout system for rows and columns simultaneously. -->
<!-- display : grid => activate grid on a container. -->
<!-- grid-template-columns - define column properties. -->
<!-- grid-template-rows - define row properties. -->
